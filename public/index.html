<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultorio Demo — Mía</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111b21;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .phone {
      width: 390px;
      height: 780px;
      background: #0b141a;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      border: 1px solid #2a3942;
      position: relative;
    }

    /* ── Mobile: pantalla completa ── */
    @media (max-width: 430px) {
      html, body {
        height: 100%;
        height: 100dvh;
      }
      body {
        align-items: stretch;
        padding: 0;
        background: #0b141a;
      }
      .phone {
        width: 100%;
        height: 100%;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
        border: none;
      }
      .setup-overlay {
        border-radius: 0;
        padding: 0 24px;
      }
    }

    /* ── Setup overlay ── */
    .setup-overlay {
      position: absolute;
      inset: 0;
      background: #0b141a;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0;
      border-radius: 40px;
      padding: 0 32px;
      transition: opacity 0.3s;
    }
    .setup-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .setup-logo { font-size: 52px; margin-bottom: 20px; }

    .setup-title {
      color: #e9edef;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    .setup-subtitle {
      color: #8696a0;
      font-size: 13px;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .setup-field {
      width: 100%;
      margin-bottom: 12px;
    }

    .setup-label {
      color: #8696a0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      display: block;
    }

    .setup-input {
      width: 100%;
      background: #202c33;
      border: 1px solid #2a3942;
      border-radius: 10px;
      padding: 13px 16px;
      color: #e9edef;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .setup-input:focus { border-color: #00a884; }
    .setup-input::placeholder { color: #4a5568; }

    /* phone prefix row */
    .phone-row {
      display: flex;
      gap: 8px;
    }
    .prefix {
      background: #202c33;
      border: 1px solid #2a3942;
      border-radius: 10px;
      padding: 13px 14px;
      color: #8696a0;
      font-size: 15px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .setup-btn {
      width: 100%;
      background: #00a884;
      border: none;
      border-radius: 24px;
      padding: 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .setup-btn:hover { background: #00c99d; }
    .setup-btn:disabled { background: #2a3942; color: #8696a0; cursor: default; }

    .setup-returning {
      margin-top: 20px;
      color: #8696a0;
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }
    .setup-returning strong { color: #25d366; }

    /* ── Header ── */
    .header {
      background: #202c33;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a3942;
      flex-shrink: 0;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #25d366, #128c7e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; min-width: 0; }
    .header-name {
      color: #e9edef;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-status {
      color: #8696a0;
      font-size: 12px;
      margin-top: 1px;
    }

    .header-actions { display: flex; gap: 4px; }

    .icon-btn {
      background: none;
      border: none;
      color: #8696a0;
      cursor: pointer;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .icon-btn:hover { color: #e9edef; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 2px; }

    .bubble-wrap { display: flex; margin-bottom: 2px; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .bubble-wrap.user .bubble {
      background: #005c4b;
      color: #e9edef;
      border-top-right-radius: 2px;
    }
    .bubble-wrap.assistant .bubble {
      background: #202c33;
      color: #e9edef;
      border-top-left-radius: 2px;
    }

    .bubble-time {
      font-size: 10px;
      color: #8696a0;
      margin-top: 3px;
      text-align: right;
    }

    /* date separator */
    .date-sep { text-align: center; margin: 8px 0; }
    .date-sep span {
      background: #182229;
      color: #8696a0;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
    }

    /* system note (ej: "Conversación anterior cargada") */
    .sys-note { text-align: center; margin: 6px 0; }
    .sys-note span {
      color: #8696a0;
      font-size: 11px;
      font-style: italic;
    }

    /* typing */
    .typing-wrap { display: flex; align-items: center; padding: 4px 0; }
    .typing-bubble {
      background: #202c33;
      border-radius: 8px;
      border-top-left-radius: 2px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #8696a0;
      animation: typing 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      background: #202c33;
      padding: 10px 12px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      border-top: 1px solid #2a3942;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1;
      background: #2a3942;
      border-radius: 24px;
      padding: 10px 16px;
      display: flex;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e9edef;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      font-family: inherit;
    }
    textarea::placeholder { color: #8696a0; }
    textarea:disabled { opacity: 0.5; }

    .send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: #00a884;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #00c99d; }
    .send-btn:disabled { background: #2a3942; cursor: default; }
    .send-btn svg { width: 20px; height: 20px; fill: white; }
  </style>
</head>
<body>
<div class="phone">

  <!-- ── Setup overlay ── -->
  <div class="setup-overlay" id="setup">
    <div class="setup-logo">🦷</div>
    <div class="setup-title">Consultorio Demo</div>
    <div class="setup-subtitle">Ingresá tu número para hablar con Mía.<br>Si ya chateaste antes, tu conversación va a seguir donde la dejaste.</div>

    <div class="setup-field">
      <label class="setup-label">Nombre y apellido</label>
      <input class="setup-input" id="nameInput" type="text" placeholder="Ej: Juan Pérez" maxlength="60" autocomplete="name" />
    </div>

    <div class="setup-field">
      <label class="setup-label">Número de WhatsApp</label>
      <div class="phone-row">
        <div class="prefix">🇦🇷 +54</div>
        <input class="setup-input" id="phoneInput" type="tel"
               placeholder="11 1234 5678" maxlength="20"
               inputmode="numeric" autocomplete="tel" />
      </div>
    </div>

    <button class="setup-btn" id="startBtn">Empezar</button>

    <div class="setup-returning" id="returningNote" style="display:none">
      📱 Encontramos tu conversación anterior con <strong id="returningName"></strong>
    </div>
  </div>

  <!-- ── Header ── -->
  <div class="header">
    <div class="avatar">👩‍⚕️</div>
    <div class="header-info">
      <div class="header-name">Mía — Consultorio</div>
      <div class="header-status" id="statusText">en línea</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="logoutBtn" title="Cambiar usuario">⟵ Salir</button>
      <button class="icon-btn" id="resetBtn" title="Borrar conversación">↺ Nueva</button>
    </div>
  </div>

  <!-- ── Messages ── -->
  <div class="messages" id="messages"></div>

  <!-- ── Input ── -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" placeholder="Escribí un mensaje" rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  // ── Config ───────────────────────────────────────
  // Cambiá por la URL de Render cuando hagas deploy
  const BACKEND_URL = "";  // vacío = mismo servidor que sirve el frontend

  // ── State ────────────────────────────────────────
  let telefono = null;
  let userName = "";
  let isWaiting = false;

  // ── DOM ──────────────────────────────────────────
  const setupEl      = document.getElementById("setup");
  const nameInput    = document.getElementById("nameInput");
  const phoneInput   = document.getElementById("phoneInput");
  const startBtn     = document.getElementById("startBtn");
  const returningNote= document.getElementById("returningNote");
  const returningName= document.getElementById("returningName");
  const messages     = document.getElementById("messages");
  const msgInput     = document.getElementById("msgInput");
  const sendBtn      = document.getElementById("sendBtn");
  const resetBtn     = document.getElementById("resetBtn");
  const logoutBtn    = document.getElementById("logoutBtn");
  const statusText   = document.getElementById("statusText");

  // ── Helpers ──────────────────────────────────────
  function sanitizePhone(raw) {
    // Eliminar todo lo que no sea dígito
    return raw.replace(/\D/g, "");
  }

  function formatTime(isoOrNull) {
    const d = isoOrNull ? new Date(isoOrNull) : new Date();
    return d.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/\n/g, "<br>");
  }

  // ── Render helpers ────────────────────────────────
  function addDateSep(label) {
    const el = document.createElement("div");
    el.className = "date-sep";
    el.innerHTML = `<span>${label}</span>`;
    messages.appendChild(el);
  }

  function addSysNote(text) {
    const el = document.createElement("div");
    el.className = "sys-note";
    el.innerHTML = `<span>${text}</span>`;
    messages.appendChild(el);
  }

  function addBubble(role, text, ts) {
    const wrap = document.createElement("div");
    wrap.className = `bubble-wrap ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `${escapeHtml(text)}<div class="bubble-time">${formatTime(ts)}${role === "user" ? " ✓✓" : ""}</div>`;
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "typing-wrap";
    wrap.id = "typing";
    wrap.innerHTML = `<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function setWaiting(val) {
    isWaiting = val;
    sendBtn.disabled = val;
    msgInput.disabled = val;
    statusText.textContent = val ? "escribiendo..." : "en línea";
  }

  // ── Cargar historial previo ───────────────────────
  function renderHistory(displayHistory) {
    messages.innerHTML = "";

    if (!displayHistory || displayHistory.length === 0) {
      addDateSep("Hoy");
      return;
    }

    addSysNote("— Conversación anterior —");
    addDateSep("Antes");

    let lastDate = null;
    for (const msg of displayHistory) {
      const d = msg.ts ? new Date(msg.ts).toLocaleDateString("es-AR") : null;
      if (d && d !== lastDate) {
        if (lastDate !== null) addDateSep(d);
        lastDate = d;
      }
      addBubble(msg.role, msg.text, msg.ts);
    }

    addDateSep("Ahora");
  }

  // ── Preview "número ya existe" mientras tipea ─────
  let checkTimeout = null;
  phoneInput.addEventListener("input", () => {
    clearTimeout(checkTimeout);
    const num = sanitizePhone(phoneInput.value);
    returningNote.style.display = "none";

    if (num.length >= 8) {
      checkTimeout = setTimeout(async () => {
        try {
          const res = await fetch(`${BACKEND_URL}/session/${num}`);
          const data = await res.json();
          if (data.existe) {
            returningName.textContent = data.nombre;
            nameInput.value = data.nombre;
            returningNote.style.display = "block";
          }
        } catch (_) {}
      }, 500);
    }
  });

  // ── Setup: arrancar chat ──────────────────────────
  startBtn.addEventListener("click", iniciarSesion);
  phoneInput.addEventListener("keydown", (e) => { if (e.key === "Enter") iniciarSesion(); });
  nameInput.addEventListener("keydown",  (e) => { if (e.key === "Enter") iniciarSesion(); });

  async function iniciarSesion() {
    const nombre = nameInput.value.trim();
    const tel = sanitizePhone(phoneInput.value);

    if (!nombre) { nameInput.focus(); return; }
    if (tel.length < 7) { phoneInput.focus(); return; }

    startBtn.disabled = true;
    startBtn.textContent = "Conectando...";

    try {
      const res = await fetch(`${BACKEND_URL}/session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ telefono: tel, nombre }),
      });
      const data = await res.json();

      telefono = tel;
      userName = data.nombre || nombre;

      // Renderizar historial si vuelve usuario existente
      renderHistory(data.displayHistory);

      // Ocultar setup
      setupEl.classList.add("hidden");
      setTimeout(() => msgInput.focus(), 100);

    } catch (err) {
      startBtn.disabled = false;
      startBtn.textContent = "Empezar";
      alert("No pude conectarme al backend. ¿Está corriendo?");
    }
  }

  // ── Logout: volver a la pantalla de setup ─────────
  logoutBtn.addEventListener("click", () => {
    telefono = null;
    userName = "";
    messages.innerHTML = "";
    nameInput.value = "";
    phoneInput.value = "";
    returningNote.style.display = "none";
    startBtn.disabled = false;
    startBtn.textContent = "Empezar";
    setupEl.classList.remove("hidden");
  });

  // ── Reset: borrar conversación actual ─────────────
  resetBtn.addEventListener("click", async () => {
    if (!telefono) return;
    if (!confirm("¿Borrás la conversación? Mía no va a recordar los mensajes anteriores.")) return;

    await fetch(`${BACKEND_URL}/session/${telefono}`, { method: "DELETE" });
    messages.innerHTML = "";
    addDateSep("Hoy");
  });

  // ── Auto-resize textarea ──────────────────────────
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
  });

  // ── Enviar con Enter ──────────────────────────────
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener("click", sendMessage);

  // ── Enviar mensaje ────────────────────────────────
  async function sendMessage() {
    if (isWaiting || !telefono) return;
    const text = msgInput.value.trim();
    if (!text) return;

    msgInput.value = "";
    msgInput.style.height = "auto";
    addBubble("user", text, null);
    setWaiting(true);
    showTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mensaje: text, telefono }),
      });

      const data = await res.json();
      hideTyping();

      if (data.reply) {
        addBubble("assistant", data.reply, data.ts);
      } else {
        addBubble("assistant", "Ups, algo falló. Intentá de nuevo.", null);
      }
    } catch (err) {
      hideTyping();
      addBubble("assistant", "No pude conectarme al servidor. ¿Está corriendo el backend?", null);
    } finally {
      setWaiting(false);
      msgInput.focus();
    }
  }
</script>
</body>
</html>
